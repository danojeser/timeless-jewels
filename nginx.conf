server {
    listen 80;
    server_name _;

    # Directorio raíz del sitio
    root /usr/share/nginx/html;

    # Redirigir la raíz al base path de la app
    location = / {
        return 301 /timeless-jewels/;
    }

    # Servir la aplicación SvelteKit (base path: /timeless-jewels)
    location /timeless-jewels {
        alias /usr/share/nginx/html/timeless-jewels;
        index index.html;

        # SPA fallback: rutas desconocidas sirven index.html
        try_files $uri $uri/ /timeless-jewels/index.html;
    }

    # Tipo MIME correcto para WebAssembly
    types {
        application/wasm wasm;
    }

    # Cabeceras para Web Workers y SharedArrayBuffer
    add_header Cross-Origin-Opener-Policy "same-origin";
    add_header Cross-Origin-Embedder-Policy "require-corp";

    # Cache de assets estáticos
    location ~* \.(js|css|wasm|png|svg|ico|woff2?)$ {
        add_header Cross-Origin-Opener-Policy "same-origin";
        add_header Cross-Origin-Embedder-Policy "require-corp";
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
    }
}
